openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: contact
    description: Customer contact form
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact request
      description: Saves a new contact request from the marketing site.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactSubmissionInput"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmissionResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ContactSubmissionInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        email:
          type: string
          format: email
          maxLength: 200
        business:
          type: string
          maxLength: 200
          nullable: true
        businessType:
          type: string
          maxLength: 120
          nullable: true
        projectType:
          type: string
          maxLength: 60
          nullable: true
        message:
          type: string
          minLength: 10
          maxLength: 4000
      required:
        - name
        - email
        - message
    ContactSubmissionResponse:
      type: object
      properties:
        id:
          type: integer
        ok:
          type: boolean
      required:
        - id
        - ok
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message
